name: Deploy TMS Online

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Bersihkan cache build
        run: rm -rf __pycache__

      - name: Siapkan config.js untuk deploy online
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path

          url = (os.environ.get('SUPABASE_URL') or '').strip()
          key = (os.environ.get('SUPABASE_ANON_KEY') or '').strip()

          if url and key:
              content = (
                  "window.TMS_CONFIG = {\n"
                  "    supabase: {\n"
                  f"        url: '{url}',\n"
                  f"        anonKey: '{key}'\n"
                  "    }\n"
                  "};\n"
              )
              Path('config.js').write_text(content, encoding='utf-8')
              print('config.js dibuat dari GitHub Secrets')
          elif Path('config.deploy.js').exists():
              Path('config.js').write_text(
                  Path('config.deploy.js').read_text(encoding='utf-8'),
                  encoding='utf-8'
              )
              print('config.js dibuat dari config.deploy.js (fallback)')
          else:
              raise SystemExit('Tidak ada secrets GitHub maupun config.deploy.js')
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
