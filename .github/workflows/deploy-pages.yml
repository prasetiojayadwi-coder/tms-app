name: Deploy TMS Online

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Bersihkan cache build
        run: rm -rf __pycache__

      - name: Buat config.js dari GitHub Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'PY'
          import os
          url = (os.environ.get('SUPABASE_URL') or '').strip()
          key = (os.environ.get('SUPABASE_ANON_KEY') or '').strip()
          if not url or not key:
              raise SystemExit('Secrets SUPABASE_URL dan SUPABASE_ANON_KEY belum diisi di GitHub Settings')
          content = (
              "window.TMS_CONFIG = {\n"
              "    supabase: {\n"
              f"        url: '{url}',\n"
              f"        anonKey: '{key}'\n"
              "    }\n"
              "};\n"
          )
          open('config.js', 'w', encoding='utf-8').write(content)
          print('config.js dibuat untuk deploy online')
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
